name: Release

# Dispara quando você faz push de uma tag v1.0.1, v2.0.0, etc.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extrair versão da tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "Versao: $v"

      - name: Publicar executável
        shell: pwsh
        run: |
          dotnet publish src/PDV.WPF/PDV.WPF.csproj `
            -c Release `
            -o ./publish

      - name: Renomear para PDV_v{versao}.exe
        shell: pwsh
        run: |
          $v    = "${{ steps.ver.outputs.VERSION }}"
          $src  = "./publish/PDV.WPF.exe"
          $dest = "./publish/PDV_v$v.exe"
          Move-Item $src $dest -Force
          echo "Arquivo: $dest"

      - name: Criar Release e fazer upload
        uses: softprops/action-gh-release@v2
        with:
          name: "PDV v${{ steps.ver.outputs.VERSION }}"
          files: "./publish/PDV_v${{ steps.ver.outputs.VERSION }}.exe"
          generate_release_notes: true
          fail_on_unmatched_files: true
